# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "develop" branch
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04-arm
    container: fedora:latest@ee88ab8a5c8bf78687ddcecadf824767e845adc19d8cdedb56f48521eb162b43
    steps:
    - uses: actions/checkout@v4
    - name: Install rpmlint
      run: dnf install -y git rpmlint rpmdevtools
    - name: rpmlint
      run: rpmlint specs/ --strict
    - name: Install build dependencies
      run: dnf install -y cargo pandoc rust
    - name: Build RPM
      run: |
        for file in `ls specs/`; do
          echo "Building specs/$file..."
          spectool -Rg "specs/$file"
          rpmbuild -ba "specs/$file"
        done
