# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  pull_request:
    branches: [ "develop" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04-arm
    container: fedora@sha256:f4e086be2d3524882fee2bc5dff91927bd412466676c64b50ec16ba5943c27d3
    steps:
    - uses: actions/checkout@v5
    - name: Install rpmlint
      run: dnf install -y git rpmlint rpmdevtools
    - name: rpmlint
      run: rpmlint specs/ --strict
    - name: Install build dependencies
      run: dnf install -y cargo pandoc rust
    - name: Build RPM
      run: |
        for file in `ls specs/`; do
          echo "Building specs/$file..."
          spectool -Rg "specs/$file"
          rpmbuild -ba "specs/$file"
        done
